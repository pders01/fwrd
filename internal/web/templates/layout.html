{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{template "title" .}} · fwrd</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
<script src="/static/app.js" defer></script>
</head>
<body>
{{template "content" .}}
</body>
</html>{{end}}

{{/* Compact header for inner pages: brand, search, manage link. The front
     page renders its own grand masthead instead. Dot (.) is the search
     query to pre-fill, or "". */}}
{{define "masthead"}}
<header class="masthead">
<a href="/" class="brand" aria-label="fwrd home">fwrd</a>
<form action="/search" method="get" class="search" role="search">
<input type="search" name="q" value="{{.}}" placeholder="Search…" autocomplete="off" aria-label="Search articles">
</form>
<nav class="mast-nav"><a href="/feeds">Feeds</a></nav>
</header>
{{end}}
