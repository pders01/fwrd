# .goreleaser.yml
version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy

builds:
  # darwin requires cgo: dotlocal's mdns talks to the system mDNSResponder
  # through the dns_sd.h SDK header. Built on a macOS runner (see release.yml)
  # where Apple clang cross-builds both arches.
  - id: darwin
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/rss/main.go
    binary: fwrd
    ldflags:
      - -s -w -X main.Version={{.Version}}

  - id: linux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    main: ./cmd/rss/main.go
    binary: fwrd
    ldflags:
      - -s -w -X main.Version={{.Version}}

  - id: windows
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    main: ./cmd/rss/main.go
    binary: fwrd
    ldflags:
      - -s -w -X main.Version={{.Version}}

homebrew_casks:
  - name: fwrd
    repository:
      owner: pders01
      name: homebrew-fwrd
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/pders01/fwrd
    description: A terminal-based RSS aggregator built with Go and Charm.sh tools
    license: MIT
    # Default directory is Casks; keep default by omitting.
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    # The darwin binaries are cgo-built (mDNS via dns_sd.h) and only ad-hoc
    # signed, so macOS quarantines them and kills the first launch with
    # "Killed: 9". Strip the quarantine flag on install so the binary runs
    # without a manual `xattr` step after every upgrade.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/fwrd"]
          end
    # Generate simple cask installing the binary from archives.
    binary: fwrd

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
