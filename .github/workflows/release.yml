name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  goreleaser:
    # macOS runner so the darwin binaries can be built with cgo (dotlocal's
    # mdns uses the dns_sd.h SDK header on macOS). Apple clang cross-builds
    # both darwin arches; linux/windows stay pure-Go (CGO_ENABLED=0).
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.12.0
          args: release --clean
        env:
          # Token for publishing release assets to this repo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Personal access token with contents:write permission to pders01/homebrew-fwrd
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
